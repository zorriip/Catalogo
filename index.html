<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Catálogo de macetas de bonsái – Pablo Zorrilla</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #2f3e46;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.03);
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card h3 {
      margin: 0;
      padding: 0.5rem;
      font-size: 1rem;
      text-align: center;
      background: #e9ecef;
    }

    /* Página detalle */
    .detail {
      padding: 1rem;
      display: none;
    }
    .detail h2 {
      text-align: center;
    }
    .photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .photos img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .back {
      display: inline-block;
      margin-bottom: 1rem;
      color: #1d3557;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <h1>Catálogo de macetas de bonsái</h1>
  <p>Piezas artesanales para bonsái · Cerámica horneada a 1180 °C</p>
</header>

<!-- Galería principal -->
<div id="mainGallery" class="gallery"></div>

<!-- Página de detalle -->
<div id="detailView" class="detail">
  <span class="back" onclick="showGallery()">← Volver a la galería</span>
  <h2 id="detailTitle"></h2>
  <p id="detailDescription" style="text-align:center; max-width:700px; margin:0 auto;"></p>
  <div id="detailPhotos" class="photos"></div>
  <div style="text-align:center; margin-top:1.5rem;">
    <a id="whatsappBtn" href="#" target="_blank" style="display:inline-block; background:#25D366; color:white; padding:0.8rem 1.2rem; border-radius:25px; text-decoration:none; font-weight:bold;">📩 Consultar por WhatsApp</a>
  </div>
</div>

<script>
  /*
    CONFIGURACIÓN
    Cada maceta tiene:
    - nombre
    - fotoPortada (la que se ve en la galería principal)
    - fotos (todas las fotos de esa maceta)

    Cambiá los nombres de archivo por los tuyos.
  */

  const macetas = [
    {
      nombre: "Maceta oval 30 × 22 × 6,5 cm",
      codigo: "M-01",
      descripcion: "Maceta oval de líneas suaves, adecuada para caducos. Superficie satinada.",
      fotoPortada: "maceta01/portada.jpg",
      fotos: [
        "maceta01/01.jpg",
        "maceta01/02.jpg",
        "maceta01/03.jpg"
      ]
    },
    {
      nombre: "Maceta rectangular 28 cm",
      codigo: "M-02",
      descripcion: "Maceta rectangular sobria, pensada para coníferas. Buen drenaje.",
      fotoPortada: "maceta02/portada.jpg",
      fotos: [
        "maceta02/01.jpg",
        "maceta02/02.jpg"
      ]
    }
  ];

  const mainGallery = document.getElementById("mainGallery");
  const detailView = document.getElementById("detailView");
  const detailTitle = document.getElementById("detailTitle");
  const detailDescription = document.getElementById("detailDescription");
  const whatsappBtn = document.getElementById("whatsappBtn");
  const detailPhotos = document.getElementById("detailPhotos");

  function loadGallery() {
    mainGallery.innerHTML = "";
    macetas.forEach((maceta, index) => {
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => showDetail(index);

      card.innerHTML = `
        <img src="${maceta.fotoPortada}" alt="${maceta.nombre}">
        <h3>${maceta.nombre}</h3>
      `;

      mainGallery.appendChild(card);
    });
  }

  function showDetail(index) {
    mainGallery.style.display = "none";
    detailView.style.display = "block";

    const maceta = macetas[index];
    detailTitle.textContent = maceta.nombre;
    detailDescription.textContent = maceta.descripcion + " · Código: " + maceta.codigo;
    const mensaje = encodeURIComponent(
      "Hola, quisiera consultar por la maceta " + maceta.codigo + " (" + maceta.nombre + ")."
    );
    whatsappBtn.href = "https://wa.me/598XXXXXXXXX?text=" + mensaje;
    detailPhotos.innerHTML = "";

    maceta.fotos.forEach(foto => {
      const img = document.createElement("img");
      img.src = foto;
      detailPhotos.appendChild(img);
    });
  }

  function showGallery() {
    detailView.style.display = "none";
    mainGallery.style.display = "grid";
  }

  loadGallery();
</script>

</body>
</html>
